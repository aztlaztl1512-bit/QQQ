<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --q-red: #e63946;
            --ans-black: #000000;
            --bg-page: #f9fafb;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-page);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ترويسة الصفحة */
        .user-header {
            width: 100%; max-width: 850px;
            margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--primary-blue);
            padding-bottom: 10px;
            background: #fff; padding: 15px; border-radius: 12px;
        }

        .header-info h2 { margin: 0; color: var(--primary-blue); font-weight: 900; }
        .header-info p { margin: 5px 0 0; color: #555; font-weight: 700; }

        .container { width: 100%; max-width: 850px; }

        /* بطاقة السؤال */
        .question-card {
            background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px;
            border: 2px solid #e5e7eb; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            page-break-inside: avoid;
        }

        .question-card::before {
            content: ""; position: absolute; right: 0; top: 0; bottom: 0;
            width: 8px; background: var(--primary-blue); border-radius: 0 15px 15px 0;
        }

        /* عنوان السؤال باللون الأحمر والسميك */
        .card-title {
            color: var(--q-red);
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
        }

        /* حقل السؤال - أحمر سميك */
        .q-text-input {
            width: 100%; padding: 15px;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            color: var(--q-red);
            font-weight: 900; /* سميك جداً */
            font-size: 1.15rem;
            background: #fff;
            margin-bottom: 20px;
            font-family: 'Cairo', sans-serif;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* حقول الخيارات - أسود سميك */
        .opt-input {
            width: 100%; padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            color: var(--ans-black);
            font-weight: 900; /* سميك جداً */
            font-size: 1rem;
            background: #fff;
        }

        /* أزرار التحكم */
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
            background: rgba(255,255,255,0.95);
            padding: 15px 30px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }

        .btn {
            border: none; padding: 12px 25px; border-radius: 30px;
            font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }

        .btn-add { background: var(--primary-blue); color: white; }
        .btn-pdf { background: var(--q-red); color: white; }
        .btn-clear { background: #374151; color: white; }
        .btn:hover { transform: scale(1.05); }

        .remove-btn { color: #ccc; cursor: pointer; font-size: 1.2rem; }
        .remove-btn:hover { color: var(--q-red); }

        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="user-header" id="pdf-header">
        <div class="edu-icon"><i class="fas fa-graduation-cap fa-3x" style="color: var(--primary-blue);"></i></div>
        <div class="header-info">
            <h2>أ. عبدالعزيز الفيفي</h2>
            <p> 😉 ثانوية الأمير عبدالمجيد </p>
        </div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()">
            <i class="fas fa-plus-circle"></i> إضافة سؤال
        </button>
        <button class="btn btn-pdf" id="pdfBtn" style="display: none;" onclick="saveAsPDF()">
            <i class="fas fa-file-pdf"></i> حفظ كـ PDF
        </button>
        <button class="btn btn-clear" onclick="clearAll()">
            <i class="fas fa-trash-alt"></i> مسح
        </button>
    </div>

    <script>
        window.onload = loadQuestions;

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="card-title"><i class="fas fa-question-circle"></i> السؤال الجديد:</div>
                    <i class="fas fa-times-circle remove-btn" onclick="removeQuestion(this)"></i>
                </div>
                <input type="text" placeholder="اكتب السؤال هنا بأحمر سميك..." class="q-text-input" value="${data ? data.text : ''}" oninput="saveAll()">
                
                <div style="margin-bottom:10px; font-weight:700; color:#555;">الخيارات:</div>
                <div class="options-grid">
                    <input type="text" placeholder="الخيار الأول" class="opt-input" value="${data ? data.opts[0] : ''}" oninput="saveAll()">
                    <input type="text" placeholder="الخيار الثاني" class="opt-input" value="${data ? data.opts[1] : ''}" oninput="saveAll()">
                    <input type="text" placeholder="الخيار الثالث" class="opt-input" value="${data ? data.opts[2] : ''}" oninput="saveAll()">
                    <input type="text" placeholder="الخيار الرابع" class="opt-input" value="${data ? data.opts[3] : ''}" oninput="saveAll()">
                </div>
                
                <div style="margin-top:20px;">
                    <label style="color:#059669; font-weight:900;">الإجابة الصحيحة:</label>
                    <input type="text" placeholder="الإجابة..." class="opt-input" style="border: 2px solid #059669;" value="${data ? data.ans : ''}" oninput="saveAll()">
                </div>
            `;
            container.appendChild(card);
            updateUI();
            saveAll();
        }

        function removeQuestion(btn) {
            btn.closest('.question-card').remove();
            saveAll();
            updateUI();
        }

        function saveAll() {
            const questions = [];
            document.querySelectorAll('.question-card').forEach(card => {
                const inputs = card.querySelectorAll('input');
                questions.push({
                    text: inputs[0].value,
                    opts: [inputs[1].value, inputs[2].value, inputs[3].value, inputs[4].value],
                    ans: inputs[5].value
                });
            });
            localStorage.setItem('fifi_v3_data', JSON.stringify(questions));
        }

        function loadQuestions() {
            const saved = localStorage.getItem('fifi_v3_data');
            if (saved) {
                const questions = JSON.parse(saved);
                questions.forEach(q => addQuestion(q));
            }
        }

        function updateUI() {
            const count = document.querySelectorAll('.question-card').length;
            document.getElementById('pdfBtn').style.display = count > 0 ? 'flex' : 'none';
        }

        function clearAll() {
            if(confirm("حذف كل الأسئلة؟")) {
                localStorage.removeItem('fifi_v3_data');
                document.getElementById('quiz-content').innerHTML = '';
                updateUI();
            }
        }

        function saveAsPDF() {
            const element = document.createElement('div');
            element.appendChild(document.getElementById('pdf-header').cloneNode(true));
            const content = document.getElementById('quiz-content').cloneNode(true);
            content.querySelectorAll('.remove-btn').forEach(b => b.remove());
            element.appendChild(content);
            
            const opt = {
                margin: 10,
                filename: 'اختبار_عبدالعزيز_الفيفي.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
