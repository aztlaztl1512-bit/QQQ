<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ الأسئلة التفاعلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #5d5fef;
            --success: #27ae60;
            --danger: #eb5757;
            --bg: #f8f9fa;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 { color: #2d3436; margin-bottom: 10px; }
        .header p { color: #636e72; }

        .container {
            width: 100%;
            max-width: 850px;
        }

        /* تصميم بطاقة السؤال */
        .question-card {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
            border-right: 6px solid var(--primary);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .input-group { margin-bottom: 15px; }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #444;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(93, 95, 239, 0.1);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        /* أزرار التحكم */
        .controls {
            margin: 30px 0;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            box-shadow: 0 6px 15px rgba(93, 95, 239, 0.3);
        }

        .btn-add:hover { background: #4a4cdb; transform: translateY(-2px); }

        .btn-pdf {
            background: var(--danger);
            color: white;
            box-shadow: 0 6px 15px rgba(235, 87, 87, 0.3);
        }

        .btn-pdf:hover { background: #d44747; transform: translateY(-2px); }

        .remove-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ccc;
            cursor: pointer;
            transition: color 0.3s;
        }
        .remove-btn:hover { color: var(--danger); }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صانع الأسئلة الاحترافي</h1>
        <p>أنشئ أسئلتك الخاصة بكل سهولة ثم صدرها كـ PDF</p>
    </div>

    <div class="container" id="quiz-container">
        </div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()">
            <i class="fas fa-plus-circle"></i> إضافة سؤال جديد
        </button>
        
        <button class="btn btn-pdf" id="pdfBtn" style="display: none;" onclick="saveAsPDF()">
            <i class="fas fa-file-pdf"></i> حفظ كملف PDF
        </button>
    </div>

    <script>
        let questionCount = 0;

        function addQuestion() {
            questionCount++;
            const container = document.getElementById('quiz-container');
            const pdfBtn = document.getElementById('pdfBtn');

            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${questionCount}`;
            
            card.innerHTML = `
                <i class="fas fa-times-circle remove-btn" onclick="removeQuestion(${questionCount})"></i>
                <div class="input-group">
                    <label>السؤال ${questionCount}:</label>
                    <input type="text" placeholder="اكتب نص السؤال هنا..." class="q-text">
                </div>
                <div class="options-grid">
                    <div class="input-group">
                        <label>الخيار أ:</label>
                        <input type="text" placeholder="الخيار الأول" class="opt">
                    </div>
                    <div class="input-group">
                        <label>الخيار ب:</label>
                        <input type="text" placeholder="الخيار الثاني" class="opt">
                    </div>
                    <div class="input-group">
                        <label>الخيار ج:</label>
                        <input type="text" placeholder="الخيار الثالث" class="opt">
                    </div>
                    <div class="input-group">
                        <label>الخيار د:</label>
                        <input type="text" placeholder="الخيار الرابع" class="opt">
                    </div>
                </div>
                <div class="input-group" style="margin-top:15px;">
                    <label style="color: var(--success);">الإجابة الصحيحة:</label>
                    <input type="text" placeholder="حدد الإجابة الصحيحة" style="border-color: var(--success);">
                </div>
            `;

            container.appendChild(card);
            
            // إظهار زر PDF عند إضافة أول سؤال
            pdfBtn.style.display = 'flex';
            
            // تمرير تلقائي لأسفل عند الإضافة
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function removeQuestion(id) {
            const card = document.getElementById(`q-card-${id}`);
            card.style.opacity = '0';
            card.style.transform = 'scale(0.8)';
            setTimeout(() => {
                card.remove();
                if (document.querySelectorAll('.question-card').length === 0) {
                    document.getElementById('pdfBtn').style.display = 'none';
                }
            }, 300);
        }

        function saveAsPDF() {
            const element = document.getElementById('quiz-container');
            const pdfBtn = document.getElementById('pdfBtn');
            const addBtn = document.querySelector('.btn-add');

            // إعدادات التصدير
            const opt = {
                margin:       10,
                filename:     'الأسئلة.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // تشغيل التحويل
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
