<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --q-red: #e63946; /* لون السؤال الأحمر */
            --ans-black: #1a1a1a; /* لون الإجابات الأسود */
            --bg-page: #f0f2f5;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-page);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* تأثير 3D للأيقونات */
        .icon-3d {
            filter: drop-shadow(2px 4px 1px rgba(0,0,0,0.2));
            transform: perspective(500px) rotateY(-10deg);
            display: inline-block;
        }

        .user-header {
            width: 100%; max-width: 850px;
            margin: 0 auto 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--primary-blue);
            padding-bottom: 10px;
            background: #fff; padding: 15px; border-radius: 10px;
        }

        .header-info h2 { margin: 0; color: var(--primary-blue); font-weight: 900; }
        .header-info p { margin: 5px 0 0; color: #555; font-weight: 700; font-family: 'Tajawal'; }

        .container { width: 100%; max-width: 850px; }

        .question-card {
            background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px;
            border: 2px solid #ddd; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            page-break-inside: avoid;
        }

        /* عنوان السؤال باللون الأحمر */
        .card-header span {
            color: var(--q-red);
            font-weight: 900;
            font-size: 1.2rem;
        }

        .input-group { margin-bottom: 15px; }
        
        /* تنسيق السؤال */
        .q-text {
            color: var(--q-red) !important;
            font-weight: 700;
            border: 2px solid #ffccd5 !important;
        }

        /* تنسيق الخيارات والأسود السميك */
        .opt-input {
            color: var(--ans-black) !important;
            font-weight: 900 !important;
            border: 1px solid #d1d5db;
        }

        input {
            width: 100%; padding: 12px; border-radius: 10px;
            font-size: 1.1rem; background: #fff; font-family: 'Tajawal', sans-serif;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000; background: rgba(255,255,255,0.9);
            padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .btn {
            border: none; padding: 12px 25px; border-radius: 30px;
            font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover { transform: scale(1.1); }
        .btn-add { background: var(--primary-blue); color: white; }
        .btn-pdf { background: #e74c3c; color: white; }
        .btn-clear { background: #34495e; color: white; }

        .remove-btn { color: #ccc; cursor: pointer; transition: 0.2s; }
        .remove-btn:hover { color: var(--q-red); }

        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="user-header" id="pdf-header">
        <div class="edu-icon icon-3d">
            <i class="fas fa-graduation-cap fa-4x" style="color: var(--primary-blue);"></i>
        </div>
        <div class="header-info">
            <h2>أ. عبدالعزيز الفيفي</h2>
            <p> 😉 ثانوية الأمير عبدالمجيد </p>
        </div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()">
            <i class="fas fa-plus-circle icon-3d"></i> إضافة سؤال
        </button>
        <button class="btn btn-pdf" id="pdfBtn" style="display:none;" onclick="saveAsPDF()">
            <i class="fas fa-file-pdf icon-3d"></i> حفظ PDF
        </button>
        <button class="btn btn-clear" onclick="clearAll()">
            <i class="fas fa-eraser icon-3d"></i> مسح
        </button>
    </div>

    <script>
        window.onload = loadQuestions;

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const qID = Date.now() + Math.random();
            const card = document.createElement('div');
            card.className = 'question-card';
            
            card.innerHTML = `
                <div class="card-header" style="display:flex; justify-content:space-between; margin-bottom:15px">
                    <span><i class="fas fa-question-circle icon-3d"></i> السؤال الجديد:</span>
                    <i class="fas fa-trash-alt remove-btn" onclick="removeQuestion(this)"></i>
                </div>
                <input type="text" placeholder="اكتب السؤال هنا..." class="save-data q-text" value="${data ? data.text : ''}" oninput="saveAll()">
                
                <div style="margin: 15px 0 10px 0; font-weight:700; color:#555">الخيارات المتاحة:</div>
                <div class="options-grid">
                    <input type="text" placeholder="الخيار الأول" class="save-data opt-input" value="${data ? data.opts[0] : ''}" oninput="saveAll()">
                    <input type="text" placeholder="الخيار الثاني" class="save-data opt-input" value="${data ? data.opts[1] : ''}" oninput="saveAll()">
                    <input type="text" placeholder="الخيار الثالث" class="save-data opt-input" value="${data ? data.opts[2] : ''}" oninput="saveAll()">
                    <input type="text" placeholder="الخيار الرابع" class="save-data opt-input" value="${data ? data.opts[3] : ''}" oninput="saveAll()">
                </div>
                
                <div style="margin-top: 15px;">
                   <label style="color:#27ae60"><i class="fas fa-check-circle icon-3d"></i> الإجابة الصحيحة:</label>
                   <input type="text" placeholder="اكتب الإجابة هنا..." class="save-data opt-input" style="border: 2px solid #27ae60" value="${data ? data.ans : ''}" oninput="saveAll()">
                </div>
            `;
            container.appendChild(card);
            checkPdfBtn();
            saveAll();
        }

        function removeQuestion(btn) {
            btn.closest('.question-card').remove();
            saveAll();
            checkPdfBtn();
        }

        function saveAll() {
            const questions = [];
            document.querySelectorAll('.question-card').forEach(card => {
                const opts = [];
                card.querySelectorAll('.opt-input').forEach((o, index) => {
                    if(index < 4) opts.push(o.value); // أول 4 هي الخيارات
                });
                const ans = card.querySelectorAll('.opt-input')[4].value; // الخامسة هي الإجابة
                questions.push({
                    text: card.querySelector('.q-text').value,
                    opts: opts,
                    ans: ans
                });
            });
            localStorage.setItem('fifi_quiz_data', JSON.stringify(questions));
        }

        function loadQuestions() {
            const saved = localStorage.getItem('fifi_quiz_data');
            if (saved) {
                const questions = JSON.parse(saved);
                questions.forEach(q => addQuestion(q));
            }
        }

        function clearAll() {
            if(confirm("سيتم حذف جميع الأسئلة، هل أنت متأكد؟")) {
                localStorage.removeItem('fifi_quiz_data');
                document.getElementById('quiz-content').innerHTML = '';
                checkPdfBtn();
            }
        }

        function checkPdfBtn() {
            const count = document.querySelectorAll('.question-card').length;
            document.getElementById('pdfBtn').style.display = count > 0 ? 'flex' : 'none';
        }

        function saveAsPDF() {
            const element = document.createElement('div');
            element.appendChild(document.getElementById('pdf-header').cloneNode(true));
            const content = document.getElementById('quiz-content').cloneNode(true);
            content.querySelectorAll('.remove-btn').forEach(b => b.remove());
            element.appendChild(content);
            
            html2pdf().set({
                margin: 10, filename: 'اختبار_أ_عبدالعزيز_الفيفي.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        }
    </script>
</body>
</html>
