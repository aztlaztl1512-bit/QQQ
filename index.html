<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #67b26f;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* تصميم البطاقة */
        .question-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-right: 5px solid var(--primary-color);
            position: relative;
            overflow: hidden;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .content-area {
            display: none; /* مخفي افتراضياً ويظهر عند الضغط */
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            animation: slideIn 0.4s ease;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* الأزرار */
        .actions {
            position: sticky;
            bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-pdf { background-color: #e74c3c; color: white; }
        .btn-pdf:hover { background-color: #c0392b; transform: scale(1.05); }

        /* حركات الانيميشن */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active .content-area {
            display: block;
        }

        .active .fa-plus {
            transform: rotate(45deg);
            color: #e74c3c;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-edit"></i> منشئ الاختبارات التفاعلي</h1>
        <p>اضغط على (+) لإضافة تفاصيل السؤال</p>
    </div>

    <div class="container" id="quiz-container">
        </div>

    <div class="actions">
        <button class="btn btn-pdf" onclick="saveAsPDF()">
            <i class="fas fa-file-pdf"></i> حفظ بصيغة PDF
        </button>
    </div>

    <script>
        const container = document.getElementById('quiz-container');
        const numberOfQuestions = 10;

        // توليد 10 بطاقات أسئلة
        for (let i = 1; i <= numberOfQuestions; i++) {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-header" onclick="toggleCard(this)">
                    <i class="fas fa-plus"></i>
                    <span>السؤال رقم ${i}</span>
                </div>
                <div class="content-area">
                    <div class="input-group">
                        <label>نص السؤال:</label>
                        <input type="text" placeholder="اكتب السؤال هنا...">
                    </div>
                    <div class="options-grid">
                        <div class="input-group">
                            <label>الخيار 1:</label>
                            <input type="text" placeholder="الخيار الأول">
                        </div>
                        <div class="input-group">
                            <label>الخيار 2:</label>
                            <input type="text" placeholder="الخيار الثاني">
                        </div>
                        <div class="input-group">
                            <label>الخيار 3:</label>
                            <input type="text" placeholder="الخيار الثالث">
                        </div>
                        <div class="input-group">
                            <label>الخيار 4:</label>
                            <input type="text" placeholder="الخيار الرابع">
                        </div>
                    </div>
                    <div class="input-group">
                        <label style="color: #27ae60;">الإجابة الصحيحة:</label>
                        <input type="text" placeholder="اكتب الإجابة هنا..." style="border-color: #27ae60;">
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        // وظيفة فتح وإغلاق البطاقة
        function toggleCard(element) {
            element.parentElement.classList.toggle('active');
        }

        // وظيفة حفظ الملف PDF
        function saveAsPDF() {
            // فتح جميع البطاقات قبل الحفظ ليظهر المحتوى في PDF
            const cards = document.querySelectorAll('.question-card');
            cards.forEach(card => card.classList.add('active'));

            const element = document.getElementById('quiz-container');
            const opt = {
                margin:       10,
                filename:     'my_quiz.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // تنفيذ عملية الحفظ
            html2pdf().set(opt).from(element).save().then(() => {
                // اختياري: إغلاق البطاقات مرة أخرى بعد الحفظ
                // cards.forEach(card => card.classList.remove('active'));
            });
        }
    </script>
</body>
</html>
